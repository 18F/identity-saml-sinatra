applications:
  - name: quicksight-login-evelyn-saml-broker
    memory: 256M
    instances: 1
    buildpacks:
      - ruby_buildpack
    command: bundle exec rackup config.ru -p $PORT -o 0.0.0.0
    env:
      APP_MODE: broker
      RACK_ENV: production

      # Broker SP configuration
      BROKER_ASSERTION_CONSUMER_SERVICE_URL: https://quicksight-login-evelyn-saml-broker.app.cloud.gov/acs
      BROKER_ISSUER: urn:gov:gsa:SAML:2.0.profiles:sp:sso:login_data:quicksight_broker
      BROKER_IDP_SSO_TARGET_URL: https://idp.evelyn.identitysandbox.gov/api/saml/auth2026
      BROKER_IDP_SLO_TARGET_URL: https://idp.evelyn.identitysandbox.gov/api/saml/logout2026
      # Optional: dynamically load IdP cert from metadata instead of fingerprint.
      BROKER_IDP_METADATA_URL: https://idp.evelyn.identitysandbox.gov/api/saml/metadata2026
      BROKER_IDP_METADATA_CACHE_SECONDS: 300
      # Optional: exact IdP cert PEM (preferred over metadata URL if set).
      # BROKER_IDP_CERT: |
      #   -----BEGIN CERTIFICATE-----
      #   ...
      #   -----END CERTIFICATE-----

      # Use a long random value.
      BROKER_PUBLIC_URL: https://quicksight-login-evelyn-saml-broker.app.cloud.gov

      # Headless behavior
      BROKER_OUTPUT_MODE: aws_broker_assertion
      AWS_SIGNIN_URL: https://signin.aws.amazon.com/saml/acs/SAMLSP9EGPBZQI0UI7HK0G

      # AWS assertion attributes
      # BROKER_AWS_ROLE_ARN: arn:aws:iam::123456789012:role/quicksight_login_gov_reader
      BROKER_AWS_ROLE_ARNS_JSON: '{"reader":"arn:aws:iam::121551302552:role/QuickSightBrokerReaderRole","author":"arn:aws:iam::121551302552:role/QuickSightBrokerAuthorRole","admin":"arn:aws:iam::121551302552:role/QuickSightBrokerAdminRole"}'
      BROKER_AWS_SAML_PROVIDER_ARN: arn:aws:iam::121551302552:saml-provider/quicksight-broker
      BROKER_AWS_IDP_ENTITY_ID: urn:gov:gsa:SAML:2.0.profiles:sp:sso:login-gov:aws-quicksight-broker
      BROKER_AWS_AUDIENCE: urn:amazon:webservices

      # Optional YAML user map authorization.
      BROKER_USER_MAP_FILE: config/user_map.yml
      # BROKER_USER_MAP_KEYS: email,uuid,name_id

      # Optional fixed QuickSight destination if upstream RelayState is absent.
      # BROKER_DEFAULT_RELAY_STATE: https://us-east-1.quicksight.aws.amazon.com/sn/start

      # Optional relay-state allowlist.
      # BROKER_RELAY_STATE_ALLOWLIST_PREFIXES: https://us-east-1.quicksight.aws.amazon.com/
